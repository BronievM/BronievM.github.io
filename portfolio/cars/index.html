.justified-gallery a.jg-custom-link:hover img { transform: scale(1.05); }

.pswp__custom-download-button {
  position: absolute; top: 15px; right: 110px; z-index: 100;
  width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
  background: none; border: none; cursor: pointer; padding: 0;
  opacity: 0.8; transition: opacity 0.2s ease;
}
.pswp__custom-download-button:hover { opacity: 1; }
.pswp__custom-download-button svg { width: 20px; height: 20px; stroke: white; }

.pswp__exif-panel {
  position: absolute;
  left: 20px;
  bottom: 20px;
  max-width: calc(100% - 40px);
  display: flex;
  flex-direction: column;
  gap: 6px;
  background: rgba(15, 15, 15, 0.82);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.08);
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
  border-radius: 12px;
  padding: 10px 14px;
  color: #fff;
  font-size: 13px;
  z-index: 100;
  user-select: text;
  -webkit-user-select: text;
  touch-action: auto;
}
.pswp__exif-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 4px;
}
.pswp__exif-row + .pswp__exif-row {
  border-top: 1px solid rgba(255, 255, 255, 0.1);
  padding-top: 6px;
}
.pswp__exif-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  white-space: nowrap;
}
.pswp__exif-item + .pswp__exif-item {
  border-left: 1px solid rgba(255, 255, 255, 0.12);
}
.pswp__exif-item svg {
  width: 15px;
  height: 15px;
  stroke: rgba(255, 255, 255, 0.6);
  flex-shrink: 0;
}
.pswp__exif-item b {
  font-weight: 600;
  max-width: 220px;
  overflow: hidden;
  text-overflow: ellipsis;
}
.pswp__exif-item--icon-only {
  padding: 4px 8px;
}
.pswp__exif-item--icon-only svg {
  stroke: #ffd166;
}

@media (max-width: 640px) {
  .pswp__exif-panel { left: 10px; bottom: 10px; padding: 8px 10px; font-size: 12px; }
  .pswp__exif-item { padding: 3px 7px; }
  .pswp__exif-item b { max-width: 130px; }
}
</style>

<script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/justifiedGallery@3.8.1/dist/js/jquery.justifiedGallery.min.js"></script>

<script type="module">
import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5/dist/photoswipe-lightbox.esm.min.js';
import PhotoSwipe from 'https://unpkg.com/photoswipe@5/dist/photoswipe.esm.min.js';

const gallery = document.querySelector('.justified-gallery');
const overlay = document.getElementById('loading-overlay');

const safetyTimer = setTimeout(() => {
    if (overlay) overlay.style.display = 'none';
    if (gallery) gallery.style.visibility = 'visible';
}, 5000);

const EXIF_ICONS = {
  camera: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
    <circle cx="12" cy="13" r="4"/>
  </svg>`,
  lens: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="9"/>
    <circle cx="12" cy="12" r="3"/>
  </svg>`,
  shutter: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <polyline points="12 6 12 12 16 14"/>
  </svg>`,
  aperture: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="10"/>
    <line x1="14.31" y1="8" x2="20.05" y2="17.94"/>
    <line x1="9.69" y1="8" x2="21.17" y2="8"/>
    <line x1="7.38" y1="12" x2="13.12" y2="2.06"/>
    <line x1="9.69" y1="16" x2="3.95" y2="6.06"/>
    <line x1="14.31" y1="16" x2="2.83" y2="16"/>
    <line x1="16.62" y1="12" x2="10.88" y2="21.94"/>
  </svg>`,
  iso: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/>
    <line x1="12" y1="1" x2="12" y2="4"/>
    <line x1="12" y1="20" x2="12" y2="23"/>
    <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
    <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
    <line x1="1" y1="12" x2="4" y2="12"/>
    <line x1="20" y1="12" x2="23" y2="12"/>
    <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
    <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
  </svg>`,
  focal: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="15 3 21 3 21 9"/>
    <polyline points="9 21 3 21 3 15"/>
    <line x1="21" y1="3" x2="14" y2="10"/>
    <line x1="3" y1="21" x2="10" y2="14"/>
  </svg>`,
  flash: `<svg viewBox="0 0 24 24" fill="currentColor" stroke="none">
    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
  </svg>`
};

window.addEventListener('DOMContentLoaded', () => {
  if (!gallery) return;

  const isMobile = window.innerWidth < 768;

  jQuery(gallery).justifiedGallery({
    rowHeight: isMobile ? 220 : 350, 
    maxRowHeight: isMobile ? 300 : 500,
    justifyThreshold: 0.85,
    margins: 10,
    captions: false,
    lastRow: 'center',
    waitThumbnailsLoad: false,
    selector: 'a.jg-custom-link',
    rel: 'gallery1'
  }).on('jg.complete', () => {
    clearTimeout(safetyTimer);
    overlay.style.display = 'none';
    gallery.style.visibility = 'visible';

    const lightbox = new PhotoSwipeLightbox({
      gallery: '.justified-gallery',
      children: 'a',
      pswpModule: () => Promise.resolve(PhotoSwipe),
      paddingFn: () => ({ top: 20, bottom: 30, left: 20, right: 20 })
    });

    lightbox.on('uiRegister', () => {
      
      lightbox.pswp.ui.registerElement({
        name: 'download-button',
        order: 9,
        isButton: true,
        tagName: 'a',
        html: `
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <path d="M7 10l5 5 5-5"/>
            <path d="M12 15V3"/>
          </svg>
        `,
        className: 'pswp__custom-download-button',
        onInit: (el, pswp) => {
          el.setAttribute('download', '');
          el.setAttribute('target', '_blank');
          pswp.on('change', () => {
            el.setAttribute('href', pswp.currSlide.data.src);
          });
        }
      });

      
      lightbox.pswp.ui.registerElement({
        name: 'exif-panel',
        appendTo: 'wrapper',
        onInit: (el, pswp) => {
          el.classList.add('pswp__exif-panel');

          const stop = (e) => e.stopPropagation();
          ['pointerdown', 'pointermove', 'pointerup', 'mousedown', 'mousemove', 'mouseup', 'touchstart', 'touchmove', 'touchend', 'wheel']
            .forEach((evt) => el.addEventListener(evt, stop, { passive: true }));

          const buildItem = (key, val, fullVal) =>
            `<div class="pswp__exif-item">${EXIF_ICONS[key]}<b title="${fullVal || val}">${val}</b></div>`;

          const buildIconOnly = (key, title) =>
            `<div class="pswp__exif-item pswp__exif-item--icon-only" title="${title}">${EXIF_ICONS[key]}</div>`;

          const update = () => {
            const slideEl = pswp.currSlide && pswp.currSlide.data.element;
            if (!slideEl) return;
            const d = slideEl.dataset;

            const hardware = [
              ['camera', d.camera, d.camera],
              ['lens', d.lens, d.lensFull], 
            ].filter(([, v]) => v);

            const settings = [
              ['shutter', d.shutter],
              ['aperture', d.aperture],
              ['iso', d.iso ? `ISO ${d.iso}` : ''],
              ['focal', d.focal],
            ].filter(([, v]) => v);

            const rows = [];
            if (hardware.length) {
              rows.push(`<div class="pswp__exif-row">${hardware.map(([k, v, full]) => buildItem(k, v, full)).join('')}</div>`);
            }
            if (settings.length) {
              let settingsHtml = settings.map(([k, v]) => buildItem(k, v)).join('');
              if (d.flash === 'true') {
                settingsHtml += buildIconOnly('flash', 'Спалах спрацював');
              }
              rows.push(`<div class="pswp__exif-row">${settingsHtml}</div>`);
            }

            el.innerHTML = rows.join('');
            el.style.display = rows.length ? 'flex' : 'none';
          };

          pswp.on('change', update);
          pswp.on('afterInit', update);
        }
      });
    });

    lightbox.init();
  });
});
</script>

  </div>
